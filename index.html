<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Birthday Experience</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================= -->
    <!-- SCREEN 1 -->
    <!-- ========================= -->

    <section id="screen1" class="screen active">

        <!-- Background Layers -->
        <div class="bg-gradient"></div>
        <div class="bg-glow"></div>

        <!-- Floating Particles -->
        <div id="particles"></div>

        <!-- Center Content -->
        <div class="center-content">

            <!-- Luxury Glow -->
            <div class="golden-core">
                <div class="core-ring ring1"></div>
                <div class="core-ring ring2"></div>
                <div class="core-ring ring3"></div>

                <div class="center-orb"></div>
            </div>

            <!-- Intro Text -->
            <div class="intro-text">

                <p class="small-title">
                    A Special Experience Awaits You
                </p>

                <h1>
                    Your journey begins with
                    <span>a single touch</span>
                </h1>

                <p class="description">
                    Take a moment...
                    This isn't just another birthday wish.
                </p>

            </div>

            <!-- Touch Area -->
            <button id="beginJourney" class="touch-button">

                <div class="touch-circle">

                    <div class="pulse pulse1"></div>
                    <div class="pulse pulse2"></div>

                    <div class="finger-light"></div>

                </div>

                <span>Touch To Begin</span>

            </button>

        </div>

    </section>

    <!-- ========================= -->
    <!-- LIGHT REVEAL OVERLAY -->
    <!-- ========================= -->

    <div id="lightReveal">

        <div class="gold-wave"></div>
        <div class="gold-wave second"></div>
        <div class="gold-wave third"></div>

    </div>

    <!-- ========================= -->
    <!-- AUDIO -->
    <!-- ========================= -->

    <audio id="introMusic" preload="auto">
        <source src="assets/audio/intro.mp3" type="audio/mpeg">
    </audio>

    <audio id="touchSound" preload="auto">
        <source src="assets/audio/touch.mp3" type="audio/mpeg">
    </audio>

    <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script src="script.js"></script>

</body>
</html>
