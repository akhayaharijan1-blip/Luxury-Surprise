<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Special Birthday Experience</title>

    <meta name="theme-color" content="#090909">

    <meta name="description"
          content="A luxury cinematic birthday experience by GIFTEVER.">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- Main CSS -->

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- ====================================================== -->
<!-- APP -->
<!-- ====================================================== -->

<div id="app">

<!-- ====================================================== -->
<!-- GLOBAL BACKGROUND -->
<!-- ====================================================== -->

<div id="background">

<div class="bg-gradient"></div>

<div class="bg-noise"></div>

<div class="bg-light"></div>

<div id="particle-container"></div>

</div>

<!-- ====================================================== -->
<!-- TRANSITION LAYER -->
<!-- ====================================================== -->

<div id="transition-layer">

<div class="transition-overlay"></div>

<div class="transition-glow"></div>

</div>

<!-- ====================================================== -->
<!-- AUDIO -->
<!-- ====================================================== -->

<audio id="bgMusic" preload="auto" loop>

<source src="assets/audio/background.mp3"
        type="audio/mpeg">

</audio>

<audio id="touchSound" preload="auto">

<source src="assets/audio/touch.mp3"
        type="audio/mpeg">

</audio>

<audio id="narrator" preload="auto">

<source src="assets/audio/narrator.mp3"
        type="audio/mpeg">

</audio>

<!-- ====================================================== -->
<!-- MAIN -->
<!-- ====================================================== -->

<main id="experience">

<!-- ====================================================== -->
<!-- SCENE 01 -->
<!-- ====================================================== -->

<section id="scene-01"
         class="scene active">

<div class="scene-wrapper">

<header class="top-logo">

<p>GIFTEVER</p>

</header>

<div class="hero">

<p class="hero-subtitle">

Every unforgettable moment
begins with a single touch.

</p>

<h1>

Something unforgettable

<span>

is waiting for you.

</span>

</h1>

<p class="hero-description">

Put on your headphones,

find a quiet place,

and enjoy this special experience.

</p>

<button id="beginExperience">

<div class="button-glow"></div>

<div class="button-ring"></div>

<div class="button-core">

▶

</div>

<span>

Touch To Begin

</span>

</button>

<p class="small-note">

Sound will begin after your touch.

</p>

</div>

<footer class="bottom-text">

Designed with ❤️ by GIFTEVER

</footer>

</div>

</section>

<!-- ====================================================== -->
<!-- SCENE 02 -->
<!-- ====================================================== -->

<section id="scene-02"
         class="scene">

</section>

<!-- ====================================================== -->
<!-- SCENE 03 -->
<!-- ====================================================== -->

<section id="scene-03"
         class="scene">

</section>

<!-- ====================================================== -->
<!-- SCENE 04 -->
<!-- ====================================================== -->

<section id="scene-04"
         class="scene">

</section>

<!-- ====================================================== -->
<!-- SCENE 05 -->
<!-- ====================================================== -->

<section id="scene-05"
         class="scene">

</section>

</main>

</div>

<script src="script.js"></script>

</body>

</html>
